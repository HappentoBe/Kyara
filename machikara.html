<!DOCTYPE html>
<html lang="ja">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-G6VKD6GLGF"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-G6VKD6GLGF');
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>キャラガチャ</title>
  <meta name="description" content="2つのQRコードで世界に1つのキャラクターを生成">
  <meta name="theme-color" content="#7c3aed">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="icon" href="icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="キャラガチャ">

  <style>
    :root {
      --bg:        #0F0A1E;
      --card:      #17112E;
      --card2:     #221A40;
      --primary:   #7c3aed;
      --primary-l: #a78bfa;
      --secondary: #ec4899;
      --accent:    #fbbf24;
      --text:      #F8F6FF;
      --muted:     #9B97B8;
      --success:   #22c55e;
      --error:     #ef4444;
      --border:    rgba(255,255,255,0.1);
      --r:         16px;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    /* ── Background glow ── */
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        radial-gradient(circle at 15% 25%, rgba(124,58,237,0.22) 0%, transparent 48%),
        radial-gradient(circle at 85% 75%, rgba(236,72,153,0.15) 0%, transparent 48%);
    }

    .app { width:100%; max-width:480px; position:relative; z-index:1; }

    /* ── Screens ── */
    .screen { display:none; flex-direction:column; align-items:center; min-height:100vh; padding:2rem 1.5rem 3rem; width:100%; }
    .screen.active { display:flex; }
    .home-content { width:100%; display:flex; flex-direction:column; align-items:center; }

    /* ── Grad text ── */
    .grad-text {
      background: linear-gradient(135deg, var(--primary-l), var(--secondary));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    /* ── Step badge ── */
    .step-badge {
      display:inline-block;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color:#fff; font-size:0.72rem; font-weight:700;
      padding:0.25rem 0.9rem; border-radius:100px; margin-bottom:1.2rem; letter-spacing:1px;
    }

    /* ══════════════════════════════════════
       HERO (Home)
    ══════════════════════════════════════ */
    .hero { text-align:center; padding:44px 0 28px; width:100%; }
    .hero-emoji {
      font-size:84px; display:block; margin-bottom:14px;
      animation: float 3s ease-in-out infinite;
    }
    .hero-title {
      font-size:34px; font-weight:900; letter-spacing:3px; margin-bottom:10px;
      background: linear-gradient(135deg, var(--primary-l), var(--secondary));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    .hero-sub { font-size:14px; color:var(--muted); line-height:1.85; }

    /* ══════════════════════════════════════
       SLOTS
    ══════════════════════════════════════ */
    .slots-row {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin: 0 0 1.2rem;
      width: 100%;
    }
    .slot {
      flex:1;
      background: rgba(80,40,120,0.5);
      border: 3px dashed rgba(150,100,255,0.6);
      border-radius: 20px;
      padding: 20px 12px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.3s, background 0.3s, transform 0.15s, box-shadow 0.3s;
      min-height: 220px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      position: relative;
      overflow: hidden;
    }
    .slot:hover { border-color: rgba(150,100,255,0.9); box-shadow: 0 0 20px rgba(124,58,237,0.3); }
    .slot:active { transform: scale(0.95); }
    .slot.filled {
      border: 3px solid var(--success);
      background: rgba(34,197,94,0.1);
      box-shadow: 0 0 20px rgba(34,197,94,0.15);
    }
    .slot-label { font-size: 1.5rem; color: #fff; font-weight: 900; }
    .slot-icon  { font-size: 7rem; margin: 2px 0; }
    .slot-val   {
      font-size: 10px; color: var(--success); font-weight: 700;
      word-break: break-all; max-width: 100%; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap; padding: 0 4px;
    }
    .plus-sign { font-size: 2rem; color: #fff; font-weight: 900; flex-shrink: 0; }

    /* ══════════════════════════════════════
       BUTTONS
    ══════════════════════════════════════ */
    .btn {
      width:100%; padding:1rem; border:none; border-radius:14px;
      font-size:1rem; font-weight:700; cursor:pointer;
      font-family:inherit; display:flex; align-items:center; justify-content:center;
      gap:0.5rem; transition:all 0.18s; margin-bottom:0.7rem;
    }
    .btn:active:not(:disabled) { transform:scale(0.97); }
    .btn-p {
      background:linear-gradient(135deg, var(--primary), var(--secondary));
      color:#fff; box-shadow:0 5px 24px rgba(124,58,237,0.4);
    }
    .btn-p:hover:not(:disabled) { box-shadow:0 8px 28px rgba(124,58,237,0.55); }
    .btn-p:disabled { opacity:0.35; cursor:not-allowed; }
    .btn-s  { background:var(--card); color:var(--text); border:1.5px solid var(--border); }
    .btn-a  { background:linear-gradient(135deg, var(--accent), #f97316); color:#1a0e00; box-shadow:0 4px 20px rgba(251,191,36,0.3); }
    .btn-g  { background:transparent; color:var(--muted); font-size:0.88rem; }

    /* ══════════════════════════════════════
       TABS
    ══════════════════════════════════════ */
    .tabs {
      display:flex; width:100%; border-radius:14px; overflow:hidden;
      background:var(--card); margin-bottom:1.2rem; border:1px solid var(--border);
    }
    .tab-btn {
      flex:1; padding:0.85rem 0.5rem; border:none; background:transparent;
      color:var(--muted); font-size:0.95rem; font-weight:700; font-family:inherit;
      cursor:pointer; transition:all 0.25s;
    }
    .tab-btn.active {
      background:linear-gradient(135deg, var(--primary), var(--secondary));
      color:#fff;
    }

    .tab-content { display:none; width:100%; }
    .tab-content.active { display:block; }

    /* ── Scanner ── */
    .scanner-box {
      width:100%; border-radius:14px; overflow:hidden;
      border:2px solid var(--primary); background:#000; position:relative;
    }
    .scanner-box video {
      width:100%; display:block; max-height:280px; object-fit:cover;
    }
    .scanner-box canvas { display:none; }
    .scan-overlay {
      position:absolute; inset:0; pointer-events:none;
    }
    .scan-corner {
      position:absolute; width:24px; height:24px; border-color:var(--primary-l); border-style:solid;
    }
    .scan-corner.tl { top:12px; left:12px; border-width:3px 0 0 3px; border-radius:4px 0 0 0; }
    .scan-corner.tr { top:12px; right:12px; border-width:3px 3px 0 0; border-radius:0 4px 0 0; }
    .scan-corner.bl { bottom:12px; left:12px; border-width:0 0 3px 3px; border-radius:0 0 0 4px; }
    .scan-corner.br { bottom:12px; right:12px; border-width:0 3px 3px 0; border-radius:0 0 4px 0; }
    .scan-line {
      position:absolute; left:10%; right:10%; height:2px;
      background:linear-gradient(90deg, transparent, var(--primary-l), transparent);
      animation: scanLine 2s ease-in-out infinite;
      box-shadow:0 0 8px var(--primary-l);
    }

    /* ── URL input ── */
    .url-input {
      width:100%; padding:0.95rem 1rem; background:var(--card2);
      border:1.5px solid var(--border); border-radius:12px;
      color:var(--text); font-size:0.95rem; font-family:inherit;
      margin-bottom:0.8rem; outline:none; transition:border-color 0.2s;
    }
    .url-input:focus { border-color:var(--primary); }
    .url-input::placeholder { color:var(--muted); }

    /* ── Error ── */
    .err { color:var(--error); font-size:0.83rem; margin-top:0.4rem; display:none; }

    /* ══════════════════════════════════════
       GACHA ANIMATION
    ══════════════════════════════════════ */
    .gacha-wrap { position:relative; width:180px; height:180px; margin:1.5rem auto 0.5rem; }
    .gacha-ball {
      width:100%; height:100%; border-radius:50%;
      background:conic-gradient(var(--primary), var(--secondary), var(--accent), var(--primary));
      animation: gachaRotate .45s linear infinite;
      box-shadow:0 0 50px rgba(124,58,237,.7);
      display:flex; align-items:center; justify-content:center; font-size:3.8rem;
    }
    .sparkles { position:absolute; inset:-20px; pointer-events:none; }
    .sparkle  { position:absolute; font-size:1.4rem; animation:sparkleFloat 1s ease-in-out infinite alternate; }

    .progress-wrap {
      width:100%; background:rgba(255,255,255,0.08); border-radius:100px;
      height:8px; margin:1.2rem 0 0.5rem; overflow:hidden;
    }
    .progress-bar {
      height:100%; border-radius:100px; width:0%;
      background:linear-gradient(90deg, var(--primary), var(--secondary));
      transition:width 0.08s linear;
      box-shadow:0 0 12px rgba(236,72,153,0.5);
    }

    .dots { display:flex; gap:0.4rem; margin:0.8rem 0; }
    .dots span { width:10px; height:10px; border-radius:50%; animation:dotPop 1.2s infinite; }
    .dots span:nth-child(1) { background:var(--primary); }
    .dots span:nth-child(2) { background:var(--secondary); animation-delay:.2s; }
    .dots span:nth-child(3) { background:var(--accent); animation-delay:.4s; }

    /* ══════════════════════════════════════
       RESULT
    ══════════════════════════════════════ */
    .char-img {
      width:210px; height:210px; border-radius:50%;
      border:4px solid var(--primary);
      box-shadow:0 0 50px rgba(124,58,237,.6);
      animation: revealChar .6s cubic-bezier(.34,1.56,.64,1) forwards;
    }
    .char-name {
      font-size:1.9rem; font-weight:900; letter-spacing:1px;
      margin:0.9rem 0 0.3rem;
      background:linear-gradient(135deg, var(--primary-l), var(--secondary));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      line-height:1.3;
    }
    .id-tag {
      display:inline-block;
      background:var(--card2); border:1.5px solid var(--border);
      border-radius:100px; padding:0.35rem 1rem;
      font-size:0.8rem; font-weight:700; color:var(--primary-l); margin:0.3rem 0;
      max-width:160px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
      vertical-align:middle;
    }

    .style-row { display:grid; grid-template-columns:1fr 1fr; gap:0.5rem; width:100%; margin:0.8rem 0; }
    .sty-btn {
      padding:0.6rem; border:1.5px solid var(--border); border-radius:10px;
      background:var(--card); color:var(--muted); cursor:pointer;
      font-size:0.82rem; font-family:inherit; transition:all .2s;
    }
    .sty-btn.active {
      border-color:var(--primary); color:var(--primary-l);
      background:rgba(124,58,237,.15);
      box-shadow:0 0 10px rgba(124,58,237,0.2);
    }

    /* ══════════════════════════════════════
       ANIMATIONS
    ══════════════════════════════════════ */
    /* ══════════════════════════════════════
       HOME REDESIGN
    ══════════════════════════════════════ */
    .home-title-wrap {
      position: relative;
      width: 100%;
      height: 170px;
      flex-shrink: 0;
    }
    .title-kara {
      position: absolute;
      left: 4px;
      bottom: 0;
      font-size: 5rem;
      font-weight: 900;
      font-style: italic;
      display: inline-block;
      transform: rotate(-12deg);
      transform-origin: left bottom;
      color: #FFD700;
      -webkit-text-stroke: 3px #FF6600;
      text-shadow: 3px 3px 0 #FF4400, 6px 6px 0 rgba(0,0,0,0.5);
      line-height: 1;
    }
    .title-gacha {
      position: absolute;
      right: 4px;
      top: 0;
      font-size: 5rem;
      font-weight: 900;
      font-style: italic;
      display: inline-block;
      transform: rotate(-12deg);
      transform-origin: right top;
      color: #00CCFF;
      -webkit-text-stroke: 3px #0066FF;
      text-shadow: 3px 3px 0 #0044CC, 6px 6px 0 rgba(0,0,0,0.5);
      line-height: 1;
    }
    .home-icon-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }
    .home-icon {
      width: 437px;
      height: 437px;
      border-radius: 84px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      margin: 0.5rem auto 1.2rem;
      display: block;
      text-align: center;
    }
    .home-desc {
      font-size: 1.4rem;
      font-weight: 900;
      color: #fff;
      -webkit-text-stroke: 2px #333;
      text-align: center;
      line-height: 1.6;
      margin-bottom: 1.2rem;
    }
    .btn-gacha-home {
      font-size: 1.3rem;
      font-weight: 900;
      padding: 1.2rem;
      border-radius: 16px;
      background: linear-gradient(135deg, #7C3AED, #EC4899);
    }
    .btn-gacha-home:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ══════════════════════════════════════
       INPUT SCREEN – font-size ×2
    ══════════════════════════════════════ */
    #screen-input .step-badge { font-size: 1.44rem; }
    #screen-input .tab-btn    { font-size: 1.9rem; }
    #screen-input .err        { font-size: 1.66rem; }
    #screen-input .url-input  { font-size: 1.9rem; }
    #screen-input .btn        { font-size: 2rem; }
    #screen-input .btn-g      { font-size: 1.76rem; }

    @keyframes float        { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
    @keyframes dotPop       { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.5);opacity:.6} }
    @keyframes gachaRotate  { to{transform:rotate(360deg)} }
    @keyframes sparkleFloat { from{transform:translateY(0) rotate(0deg) scale(1)} to{transform:translateY(-16px) rotate(25deg) scale(1.3)} }
    @keyframes revealChar   { from{opacity:0;transform:scale(.3) rotate(-30deg)} to{opacity:1;transform:scale(1) rotate(0deg)} }
    @keyframes fadeUp       { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    @keyframes scanLine     { 0%,100%{top:12px} 50%{top:calc(100% - 14px)} }
  </style>
</head>
<body>
<div class="app">

  <!-- ══════════════════════════════════════
       HOME
  ══════════════════════════════════════ -->
  <div id="screen-welcome" class="screen active">
    <div class="home-content">
      <!-- アイコン -->
      <div class="home-icon-wrap">
        <img src="icon.png" class="home-icon" alt="キャラガチャ">
      </div>

      <!-- 説明 -->
      <p class="home-desc">２つのQRコードから<br>世界に１つのアイコンが誕生！！</p>

      <!-- スロット -->
      <div class="slots-row">
        <div class="slot" id="slot1" onclick="openInput(1)">
          <div class="slot-label" id="slot1-label">1つ目</div>
          <div class="slot-icon" id="slot1-icon">📷</div>
          <div class="slot-val" id="slot1-val"></div>
        </div>
        <div class="plus-sign">×</div>
        <div class="slot" id="slot2" onclick="openInput(2)">
          <div class="slot-label" id="slot2-label">2つ目</div>
          <div class="slot-icon" id="slot2-icon">📷</div>
          <div class="slot-val" id="slot2-val"></div>
        </div>
      </div>

      <button class="btn btn-gacha-home" id="btn-gacha" onclick="startGenerating()" disabled>
        🎰 ガチャを回す！
      </button>
    </div>
  </div>

  <!-- ══════════════════════════════════════
       INPUT
  ══════════════════════════════════════ -->
  <div id="screen-input" class="screen">
    <div style="width:100%;padding-top:3rem;">
      <span class="step-badge" id="input-badge">SLOT 1</span>
      <h2 style="font-size:2.6rem;font-weight:700;margin-bottom:.4rem;" id="input-title">1つ目を入力</h2>
      <p style="color:var(--muted);font-size:1.66rem;margin-bottom:1.1rem;">
        QRスキャンまたはURLを貼り付けてください
      </p>

      <div class="tabs">
        <button class="tab-btn active" id="tab-camera-btn" onclick="switchTab('camera')">📷 カメラ</button>
        <button class="tab-btn" id="tab-url-btn" onclick="switchTab('url')">🔗 URLを貼る</button>
      </div>

      <!-- Camera tab -->
      <div class="tab-content active" id="tab-camera">
        <div class="scanner-box">
          <video id="scan-video" playsinline autoplay muted webkit-playsinline></video>
          <canvas id="scan-canvas"></canvas>
          <div class="scan-overlay">
            <div class="scan-corner tl"></div>
            <div class="scan-corner tr"></div>
            <div class="scan-corner bl"></div>
            <div class="scan-corner br"></div>
            <div class="scan-line"></div>
          </div>
        </div>
        <div id="scan-err" class="err" style="margin-top:.6rem;"></div>
        <p style="color:var(--muted);font-size:1.56rem;text-align:center;margin-top:.6rem;">
          QRコードにカメラを向けると自動で読み取ります
        </p>
      </div>

      <!-- URL tab -->
      <div class="tab-content" id="tab-url">
        <input
          type="url"
          class="url-input"
          id="url-input"
          placeholder="https://example.com/..."
          inputmode="url"
        />
        <div id="url-err" class="err"></div>
        <button class="btn btn-p" onclick="confirmUrl()">✅ 決定</button>
      </div>

      <button class="btn btn-g" onclick="closeInput()" style="margin-top:.5rem;">← ホームへ戻る</button>
    </div>
  </div>

  <!-- ══════════════════════════════════════
       GENERATING
  ══════════════════════════════════════ -->
  <div id="screen-generating" class="screen">
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;text-align:center;">
      <div class="step-badge">GENERATING...</div>
      <h2 style="font-size:1.6rem;font-weight:900;margin-bottom:.4rem;" class="grad-text">
        キャラクター生成中
      </h2>
      <p style="color:var(--muted);font-size:.88rem;margin-bottom:.3rem;">
        2つのデータから奇跡のキャラが誕生！
      </p>
      <div class="gacha-wrap">
        <div class="gacha-ball" id="gacha-emoji">🎰</div>
        <div class="sparkles">
          <span class="sparkle" style="top:5%;left:10%;animation-delay:0s;">✨</span>
          <span class="sparkle" style="top:8%;right:12%;animation-delay:.25s;">⭐</span>
          <span class="sparkle" style="bottom:8%;left:15%;animation-delay:.5s;">💫</span>
          <span class="sparkle" style="bottom:5%;right:10%;animation-delay:.75s;">✨</span>
          <span class="sparkle" style="top:42%;left:2%;animation-delay:.15s;">⭐</span>
          <span class="sparkle" style="top:42%;right:2%;animation-delay:.6s;">💫</span>
        </div>
      </div>
      <div class="progress-wrap" style="max-width:280px;margin:1rem auto 0.4rem;">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <div class="dots"><span></span><span></span><span></span></div>
    </div>
  </div>

  <!-- ══════════════════════════════════════
       RESULT
  ══════════════════════════════════════ -->
  <div id="screen-result" class="screen">
    <div style="width:100%;text-align:center;padding-top:2rem;animation:fadeUp .5s ease;">
      <div style="font-size:2.2rem;margin-bottom:.3rem;">🎉</div>
      <h2 class="grad-text" style="font-size:1.55rem;font-weight:900;margin-bottom:.2rem;">キャラ完成！</h2>
      <p style="color:var(--muted);font-size:.84rem;margin-bottom:.9rem;">あなただけの世界に1つのキャラクター</p>

      <div style="display:flex;align-items:center;justify-content:center;gap:.6rem;margin-bottom:.5rem;flex-wrap:wrap;">
        <span id="res-val-a" class="id-tag">---</span>
        <span style="color:var(--secondary);font-size:1.3rem;font-weight:900;">×</span>
        <span id="res-val-b" class="id-tag">---</span>
      </div>

      <div style="margin:1.2rem auto;display:flex;justify-content:center;">
        <img id="result-img" class="char-img" alt="character">
      </div>

      <div class="char-name" id="char-name-display">---</div>

      <div class="style-row">
        <button class="sty-btn" data-style="bottts"    onclick="switchStyle('bottts',this)">🤖 ロボット</button>
        <button class="sty-btn" data-style="lorelei"   onclick="switchStyle('lorelei',this)">👤 キャラ</button>
        <button class="sty-btn" data-style="pixel-art" onclick="switchStyle('pixel-art',this)">👾 ピクセル</button>
        <button class="sty-btn" data-style="fun-emoji" onclick="switchStyle('fun-emoji',this)">😎 絵文字</button>
      </div>

      <button class="btn btn-a" onclick="downloadCharacter()" style="margin-top:.4rem;">💾 PNG保存</button>
      <button class="btn btn-s" onclick="goHome()">🔄 リセット</button>
    </div>
  </div>

</div><!-- /app -->

<!-- External libs -->
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<script src="wordlist.js"></script>

<script>
// ============================================================
// STATE
// ============================================================
let val1 = null;       // slot 1 raw string
let val2 = null;       // slot 2 raw string
let currentSlot = 1;   // which slot is being filled
let curStyle    = 'bottts';
let curBg       = '';
let currentSeed = '';
let scanActive  = null; // { stream, rafId }

// ============================================================
// UTILS
// ============================================================
function charCodeSum(str) {
  let s = 0;
  for (let i = 0; i < str.length; i++) s += str.charCodeAt(i);
  return s;
}

/** Returns { style, bg } based on adjective index */
function getStyleConfig(idx) {
  if (idx < 100)  return { style: 'bottts',    bg: '7c3aed,a78bfa' };
  if (idx < 200)  return { style: 'lorelei',   bg: '1a0a0a,3d0000' };
  if (idx < 300)  return { style: 'bottts',    bg: '0a1628,1e3a5f' };
  if (idx < 400)  return { style: 'lorelei',   bg: '1a1a2e,2d1b4e' };
  if (idx < 500)  return { style: 'bottts',    bg: '003333,006666' };
  if (idx < 600)  return { style: 'pixel-art', bg: '1a1a3e,2e2e6e' };
  if (idx < 700)  return { style: 'fun-emoji', bg: '3d0030,7a0060' };
  if (idx < 800)  return { style: 'lorelei',   bg: '0d0d0d,1a0a2e' };
  if (idx < 900)  return { style: 'pixel-art', bg: '0a2010,1a4020' };
  if (idx < 1000) return { style: 'bottts',    bg: '1a1000,3d2800' };
  return { style: 'bottts', bg: null };
}

/** Build DiceBear v9 URL */
function buildCharUrl(seed, style, bg) {
  let url = `https://api.dicebear.com/9.x/${style}/svg?seed=${encodeURIComponent(seed)}`;
  if (bg) url += `&backgroundColor=${bg}`;
  return url;
}

// ============================================================
// SCREEN
// ============================================================
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
}

// ============================================================
// SLOT
// ============================================================
function updateSlotUI(num, value) {
  const slot  = document.getElementById('slot' + num);
  const label = document.getElementById('slot' + num + '-label');
  const icon  = document.getElementById('slot' + num + '-icon');
  const valEl = document.getElementById('slot' + num + '-val');
  slot.classList.add('filled');
  label.textContent = num + 'つ目 ✅';
  icon.textContent  = '✅';
  valEl.textContent = value.length > 24 ? value.slice(0, 22) + '…' : value;
  if (val1 && val2) document.getElementById('btn-gacha').disabled = false;
}

function resetSlots() {
  [1, 2].forEach(n => {
    document.getElementById('slot' + n).classList.remove('filled');
    document.getElementById('slot' + n + '-label').textContent = n + 'つ目';
    document.getElementById('slot' + n + '-icon').textContent  = '📷';
    document.getElementById('slot' + n + '-val').textContent   = '';
  });
  document.getElementById('btn-gacha').disabled = true;
}

// ============================================================
// INPUT SCREEN
// ============================================================
function openInput(slotNum) {
  currentSlot = slotNum;
  document.getElementById('input-badge').textContent  = 'SLOT ' + slotNum;
  document.getElementById('input-title').textContent  = slotNum + 'つ目を入力';
  document.getElementById('url-input').value = '';
  hideErrEl('url-err');
  hideErrEl('scan-err');
  showScreen('input');
  // Switch to camera tab and start scan after screen is shown
  setTimeout(() => switchTab('camera'), 150);
}

function closeInput() {
  stopScan();
  showScreen('welcome');
}

// ============================================================
// TABS
// ============================================================
function switchTab(tab) {
  const isCam = (tab === 'camera');
  document.getElementById('tab-camera-btn').classList.toggle('active', isCam);
  document.getElementById('tab-url-btn').classList.toggle('active', !isCam);
  document.getElementById('tab-camera').classList.toggle('active', isCam);
  document.getElementById('tab-url').classList.toggle('active', !isCam);
  if (isCam) {
    startScan();
  } else {
    stopScan();
    setTimeout(() => document.getElementById('url-input').focus(), 150);
  }
}

// ============================================================
// QR SCAN (jsQR + canvas, iPhone Safari compatible)
// ============================================================
function startScan() {
  stopScan();
  const video  = document.getElementById('scan-video');
  const canvas = document.getElementById('scan-canvas');
  const ctx    = canvas.getContext('2d');
  let lastDetect = 0;

  navigator.mediaDevices.getUserMedia({
    video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }
  })
  .then(stream => {
    scanActive = { stream, rafId: null };
    video.srcObject = stream;
    // iPhone Safari needs explicit play() call
    const playPromise = video.play();
    if (playPromise) playPromise.catch(() => {});

    function tick() {
      if (!scanActive) return;
      if (video.readyState >= video.HAVE_ENOUGH_DATA && video.videoWidth > 0) {
        canvas.width  = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        try {
          const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const code    = jsQR(imgData.data, imgData.width, imgData.height, { inversionAttempts: 'dontInvert' });
          if (code && code.data) {
            const now = Date.now();
            if (now - lastDetect > 2000) {
              lastDetect = now;
              onScanned(code.data);
              return; // stop tick after detect
            }
          }
        } catch(e) {}
      }
      if (scanActive) scanActive.rafId = requestAnimationFrame(tick);
    }
    scanActive.rafId = requestAnimationFrame(tick);
  })
  .catch(() => {
    showErrEl('scan-err', 'カメラにアクセスできません。ブラウザのカメラ許可を確認してください。');
  });
}

function stopScan() {
  if (!scanActive) return;
  if (scanActive.rafId) cancelAnimationFrame(scanActive.rafId);
  if (scanActive.stream) scanActive.stream.getTracks().forEach(t => t.stop());
  const v = document.getElementById('scan-video');
  if (v) { v.srcObject = null; }
  scanActive = null;
}

function onScanned(value) {
  if (!value || !value.trim()) return;
  stopScan();
  setSlotValue(currentSlot, value.trim());
  showScreen('welcome');
}

// ============================================================
// URL INPUT
// ============================================================
function confirmUrl() {
  const val = (document.getElementById('url-input').value || '').trim();
  if (!val) {
    showErrEl('url-err', 'URLまたはテキストを入力してください');
    return;
  }
  setSlotValue(currentSlot, val);
  showScreen('welcome');
}

// ============================================================
// SLOT VALUE
// ============================================================
function setSlotValue(num, value) {
  if (num === 1) val1 = value;
  else           val2 = value;
  updateSlotUI(num, value);
}

// ============================================================
// ERROR HELPERS
// ============================================================
function showErrEl(id, msg) {
  const el = document.getElementById(id);
  if (el) { el.textContent = msg; el.style.display = 'block'; }
}
function hideErrEl(id) {
  const el = document.getElementById(id);
  if (el) el.style.display = 'none';
}

// ============================================================
// GACHA ANIMATION (3 sec roulette + progress bar)
// ============================================================
const GACHA_EMOJIS = ['🎰','🎲','🎮','🃏','🎯','🎪','🎨','🌟','💫','⭐','🔮','🎭','🤖','👾','🌈','💎'];

function startGenerating() {
  stopScan();
  showScreen('generating');

  const bar      = document.getElementById('progress-bar');
  const emojiEl  = document.getElementById('gacha-emoji');
  bar.style.width = '0%';

  const duration  = 3000;
  const startTime = Date.now();

  const emojiTimer = setInterval(() => {
    emojiEl.textContent = GACHA_EMOJIS[Math.floor(Math.random() * GACHA_EMOJIS.length)];
  }, 180);

  function tick() {
    const elapsed = Date.now() - startTime;
    const pct     = Math.min((elapsed / duration) * 100, 100);
    bar.style.width = pct + '%';
    if (elapsed < duration) {
      requestAnimationFrame(tick);
    } else {
      clearInterval(emojiTimer);
      showResult();
    }
  }
  requestAnimationFrame(tick);
}

// ============================================================
// RESULT
// ============================================================
function showResult() {
  // Compute word indices
  const adjIdx  = charCodeSum(val1) % ADJECTIVES.length;
  const nounIdx = charCodeSum(val2) % NOUNS.length;
  const charName = ADJECTIVES[adjIdx] + ' ' + NOUNS[nounIdx];

  // DiceBear config from adjective index
  const cfg = getStyleConfig(adjIdx);
  curStyle  = cfg.style;
  curBg     = cfg.bg || '';

  // Seed = combined char code sums for determinism
  currentSeed = String(charCodeSum(val1)) + '-' + String(charCodeSum(val2));

  // Update display
  document.getElementById('char-name-display').textContent = charName;

  const dispA = val1.length > 22 ? val1.slice(0, 20) + '…' : val1;
  const dispB = val2.length > 22 ? val2.slice(0, 20) + '…' : val2;
  document.getElementById('res-val-a').textContent = dispA;
  document.getElementById('res-val-b').textContent = dispB;

  // Highlight active style button
  document.querySelectorAll('.sty-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.style === curStyle);
  });

  updateChar();
  showScreen('result');
}

function updateChar() {
  const img = document.getElementById('result-img');
  img.src = buildCharUrl(currentSeed, curStyle, curBg);
  img.style.animation = 'none';
  void img.offsetHeight; // force reflow
  img.style.animation = 'revealChar .6s cubic-bezier(.34,1.56,.64,1) forwards';
}

function switchStyle(style, btn) {
  curStyle = style;
  document.querySelectorAll('.sty-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  updateChar();
}

// ============================================================
// PNG DOWNLOAD
// ============================================================
async function downloadCharacter() {
  const adjIdx   = charCodeSum(val1) % ADJECTIVES.length;
  const nounIdx  = charCodeSum(val2) % NOUNS.length;
  const safeName = (ADJECTIVES[adjIdx] + '_' + NOUNS[nounIdx]).replace(/[^a-zA-Z0-9_\-]/g, '');
  const url      = buildCharUrl(currentSeed, curStyle, curBg);
  const fname    = `machichara_${safeName}_${curStyle}.png`;
  try {
    const res     = await fetch(url);
    const svgText = await res.text();
    const svgWithSize = svgText.replace('<svg', '<svg width="512" height="512"');
    const base64  = btoa(unescape(encodeURIComponent(svgWithSize)));
    const dataUrl = 'data:image/svg+xml;base64,' + base64;
    const img     = new Image();
    img.onload = () => {
      const c   = document.createElement('canvas');
      c.width   = 512; c.height = 512;
      const ctx = c.getContext('2d');
      ctx.fillStyle = '#0F0A1E';
      ctx.fillRect(0, 0, 512, 512);
      ctx.drawImage(img, 0, 0, 512, 512);
      c.toBlob(blob => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = fname; a.click();
      }, 'image/png');
    };
    img.onerror = () => {
      const a = document.createElement('a'); a.href = dataUrl;
      a.download = fname.replace('.png', '.svg'); a.click();
    };
    img.src = dataUrl;
  } catch(e) {
    alert('ダウンロードに失敗しました。画像を長押しして保存してください。');
  }
}

// ============================================================
// RESET
// ============================================================
function goHome() {
  stopScan();
  val1 = val2 = null;
  curStyle = 'bottts'; curBg = ''; currentSeed = '';
  resetSlots();
  showScreen('welcome');
}

// ============================================================
// INIT
// ============================================================
window.addEventListener('load', () => showScreen('welcome'));

// Service Worker 登録
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
</body>
</html>
