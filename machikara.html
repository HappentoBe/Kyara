<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ガチャボット</title>
  <meta name="description" content="2人のInstagram IDで世界に1つのキャラクターを生成">
  <meta name="theme-color" content="#6C63FF">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="ガチャボット">
  <link id="pwa-manifest" rel="manifest">

  <style>
    :root {
      --primary:   #6C63FF;
      --primary-d: #5A52D5;
      --primary-l: #A78BFA;
      --secondary: #FF6B9D;
      --accent:    #FFD93D;
      --bg:        #0F0E17;
      --card:      #1A1A2E;
      --card2:     #252540;
      --text:      #FFFFFE;
      --muted:     #A7A9BE;
      --success:   #06D6A0;
      --error:     #EF233C;
      --border:    rgba(255,255,255,0.1);
      --r:         16px;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }
    .app { width:100%; max-width:480px; position:relative; }

    /* ── Screens ── */
    .screen { display:none; flex-direction:column; align-items:center; min-height:100vh; padding:2rem 1.5rem 3rem; }
    .screen.active { display:flex; }

    /* ── Typography helpers ── */
    .grad-text {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .step-badge {
      display:inline-block;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color:#fff; font-size:0.72rem; font-weight:700;
      padding:0.25rem 0.9rem; border-radius:100px; margin-bottom:1.2rem;
    }
    .id-tag {
      display:inline-block;
      background:var(--card2); border:1.5px solid var(--border);
      border-radius:100px; padding:0.35rem 1rem;
      font-size:0.88rem; font-weight:700; color:var(--primary); margin:0.3rem 0;
    }

    /* ── Cards ── */
    .card { width:100%; background:var(--card); border-radius:var(--r); padding:1.4rem; border:1px solid var(--border); margin-bottom:1rem; }

    /* ── Buttons ── */
    .btn {
      width:100%; padding:1rem; border:none; border-radius:14px;
      font-size:1rem; font-weight:700; cursor:pointer;
      font-family:inherit; display:flex; align-items:center; justify-content:center;
      gap:0.5rem; transition:all 0.18s; margin-bottom:0.7rem;
    }
    .btn:active { transform:scale(0.97); }
    .btn-p  { background:linear-gradient(135deg,var(--primary),var(--secondary)); color:#fff; box-shadow:0 4px 20px rgba(108,99,255,.35); }
    .btn-s  { background:var(--card); color:var(--text); border:1.5px solid var(--border); }
    .btn-a  { background:linear-gradient(135deg,var(--accent),#FF9F43); color:#1a1a2e; box-shadow:0 4px 20px rgba(255,211,61,.3); }
    .btn-g  { background:transparent; color:var(--muted); font-size:0.88rem; }

    /* ── Error ── */
    .err { color:var(--error); font-size:0.83rem; margin-top:0.4rem; display:none; }

    /* ── Scanner ── */
    .scanner-box { width:100%; border-radius:14px; overflow:hidden; border:2px solid var(--primary); background:#000; }
    .scanner-box video { width:100%; display:block; }

    /* ── Waiting dots ── */
    .dots { display:flex; gap:0.4rem; margin:1rem 0; }
    .dots span { width:10px; height:10px; border-radius:50%; animation:dotPop 1.2s infinite; }
    .dots span:nth-child(1) { background:var(--primary); }
    .dots span:nth-child(2) { background:var(--secondary); animation-delay:.2s; }
    .dots span:nth-child(3) { background:var(--accent); animation-delay:.4s; }

    /* ── Scanned ID display ── */
    .scanned-id {
      display:flex; align-items:center; gap:.5rem;
      background:rgba(6,214,160,.1); border:1.5px solid var(--success);
      border-radius:12px; padding:.7rem 1rem; margin:.8rem 0;
    }
    .scanned-id .check { font-size:1.1rem; }
    .scanned-id .name { font-weight:700; color:var(--success); }

    /* ── Gacha animation ── */
    .gacha-wrap { position:relative; width:180px; height:180px; margin:1.5rem auto; }
    .gacha-ball {
      width:100%; height:100%; border-radius:50%;
      background:conic-gradient(var(--primary),var(--secondary),var(--accent),var(--primary));
      animation:gachaRotate .5s linear infinite;
      box-shadow:0 0 40px rgba(108,99,255,.6);
      display:flex; align-items:center; justify-content:center; font-size:3.5rem;
    }
    .sparkles { position:absolute; inset:-20px; pointer-events:none; }
    .sparkle  { position:absolute; font-size:1.4rem; animation:sparkleFloat 1s ease-in-out infinite alternate; }

    /* ── Result character ── */
    .char-img {
      width:200px; height:200px; border-radius:50%;
      border:4px solid var(--primary);
      box-shadow:0 0 40px rgba(108,99,255,.5);
      animation:revealChar .6s cubic-bezier(.34,1.56,.64,1) forwards;
    }

    /* ── Style toggles ── */
    .style-row { display:grid; grid-template-columns:1fr 1fr; gap:0.5rem; width:100%; margin:0.8rem 0; }
    .sty-btn {
      padding:0.55rem; border:1.5px solid var(--border); border-radius:10px;
      background:var(--card); color:var(--muted); cursor:pointer;
      font-size:0.82rem; font-family:inherit; transition:all .2s;
    }
    .sty-btn.active { border-color:var(--primary); color:var(--primary); background:rgba(108,99,255,.12); }

    /* ── Stars background ── */
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none;
      background-image:
        radial-gradient(circle at 20% 30%, rgba(108,99,255,0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(255,107,157,0.1) 0%, transparent 50%);
    }

    /* ── Hero ── */
    .hero { text-align:center; padding:32px 0 24px; width:100%; }
    .hero-emoji {
      font-size:72px; display:block; margin-bottom:12px;
      animation:float 3s ease-in-out infinite;
    }
    .hero-title {
      font-size:30px; font-weight:900; letter-spacing:2px; margin-bottom:8px;
      background:linear-gradient(135deg, var(--primary-l), var(--secondary));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    .hero-sub { font-size:14px; color:var(--muted); line-height:1.7; }

    /* ── Slots ── */
    .slots-row {
      display:flex; align-items:center; justify-content:center;
      gap:12px; margin:24px 0; width:100%;
    }
    .slot {
      flex:1; background:var(--card);
      border:2px dashed rgba(108,99,255,0.45);
      border-radius:20px; padding:18px 12px;
      text-align:center; transition:border-color 0.3s, background 0.3s;
      min-height:100px; display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:6px;
    }
    .slot.filled {
      border:2px solid var(--success);
      background:rgba(6,214,160,0.08);
    }
    .slot-label { font-size:11px; color:var(--muted); font-weight:600; letter-spacing:1px; }
    .slot-icon  { font-size:28px; }
    .slot-id    { font-size:12px; color:var(--success); font-weight:700; word-break:break-all; }
    .plus-sign  { font-size:28px; color:var(--muted); flex-shrink:0; }

    /* ── Primary / Secondary buttons (home screen) ── */
    .btn-primary {
      display:block; width:100%; padding:16px 20px; border:none;
      border-radius:14px; font-size:15px; font-weight:700;
      cursor:pointer; font-family:inherit; text-align:center;
      background:linear-gradient(135deg, var(--primary), var(--secondary));
      color:#fff; box-shadow:0 6px 24px rgba(108,99,255,0.4);
      margin-bottom:10px; transition:opacity 0.15s, transform 0.15s;
    }
    .btn-primary:active:not(:disabled) { opacity:0.8; transform:scale(0.97); }
    .btn-primary:disabled { opacity:0.35; cursor:not-allowed; }
    .btn-secondary {
      display:block; width:100%; padding:16px 20px; border:none;
      border-radius:14px; font-size:15px; font-weight:700;
      cursor:pointer; font-family:inherit; text-align:center;
      background:var(--card2); color:var(--primary-l);
      border:2px solid rgba(108,99,255,0.35);
      margin-bottom:10px; transition:opacity 0.15s, transform 0.15s;
    }
    .btn-secondary:active:not(:disabled) { opacity:0.8; transform:scale(0.97); }
    .btn-secondary:disabled { opacity:0.35; cursor:not-allowed; }

    /* ── Animations ── */
    @keyframes float        { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    @keyframes dotPop       { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.5);opacity:.6} }
    @keyframes gachaRotate  { to{transform:rotate(360deg)} }
    @keyframes sparkleFloat { from{transform:translateY(0) rotate(0deg) scale(1)} to{transform:translateY(-15px) rotate(25deg) scale(1.25)} }
    @keyframes revealChar   { from{opacity:0;transform:scale(.3) rotate(-30deg)} to{opacity:1;transform:scale(1) rotate(0deg)} }
    @keyframes fadeUp       { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
  </style>
</head>
<body>
<div class="app">

  <!-- ══════════════════════════════════════
       WELCOME（ホーム）
  ══════════════════════════════════════ -->
  <div id="screen-welcome" class="screen active">
    <div class="hero">
      <span class="hero-emoji">🤖</span>
      <div class="hero-title">ガチャボット</div>
      <div class="hero-sub">QRコードを2つ読み込んでね<br>ふたりのキャラクターが生まれるよ！</div>
    </div>

    <div class="slots-row">
      <div class="slot" id="slot1">
        <div class="slot-label">1つ目</div>
        <div class="slot-icon">📷</div>
      </div>
      <div class="plus-sign">✕</div>
      <div class="slot" id="slot2">
        <div class="slot-label">2つ目</div>
        <div class="slot-icon">📷</div>
      </div>
    </div>

    <button class="btn-primary" id="btn-scan1" onclick="startApp1()">📷 1つ目のQRを読む</button>
    <button class="btn-secondary" id="btn-scan2" onclick="startApp2()" disabled>📷 2つ目のQRを読む</button>
  </div>

  <!-- ══════════════════════════════════════
       SCAN 1 — 1人目のQRをスキャン
  ══════════════════════════════════════ -->
  <div id="screen-scan1" class="screen">
    <div style="width:100%;padding-top:3.5rem;">
      <span class="step-badge">STEP 1 / 2</span>
      <h2 style="font-size:1.25rem;font-weight:700;margin-bottom:.4rem;">1人目のQRをスキャン</h2>
      <p style="color:var(--muted);font-size:.83rem;margin-bottom:1rem;">
        InstagramアプリのQRコードにカメラを向けてください
      </p>
      <div class="scanner-box">
        <video id="scan-video1" playsinline autoplay muted></video>
        <canvas id="scan-canvas1" style="display:none;"></canvas>
      </div>
      <div id="scan1-err" class="err" style="margin-top:.5rem;"></div>
      <button class="btn btn-g" onclick="goHome()" style="margin-top:1.5rem;">← ホームへ</button>
    </div>
  </div>

  <!-- ══════════════════════════════════════
       SCAN 2 — 2人目のQRをスキャン
  ══════════════════════════════════════ -->
  <div id="screen-scan2" class="screen">
    <div style="width:100%;padding-top:3.5rem;">
      <span class="step-badge">STEP 2 / 2</span>
      <h2 style="font-size:1.25rem;font-weight:700;margin-bottom:.4rem;">2人目のQRをスキャン</h2>
      <p style="color:var(--muted);font-size:.83rem;margin-bottom:.6rem;">
        もう1人のInstagramQRにカメラを向けてください
      </p>
      <div id="scan1-result" class="scanned-id">
        <span class="check">✅</span>
        <span id="scan1-name" class="name">@---</span>
        <span style="color:var(--muted);font-size:.78rem;">スキャン済み</span>
      </div>
      <div class="scanner-box">
        <video id="scan-video2" playsinline autoplay muted></video>
        <canvas id="scan-canvas2" style="display:none;"></canvas>
      </div>
      <div id="scan2-err" class="err" style="margin-top:.5rem;"></div>
      <button class="btn btn-g" onclick="goHome()" style="margin-top:1.5rem;">← ホームへ</button>
    </div>
  </div>

  <!-- ══════════════════════════════════════
       GENERATING
  ══════════════════════════════════════ -->
  <div id="screen-generating" class="screen">
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;text-align:center;">
      <h2 style="font-size:1.5rem;font-weight:900;margin-bottom:.4rem;">キャラクター生成中...</h2>
      <p style="color:var(--muted);font-size:.88rem;margin-bottom:.5rem;">2つのIDから奇跡のキャラが誕生！</p>
      <div class="gacha-wrap">
        <div class="gacha-ball">🎰</div>
        <div class="sparkles">
          <span class="sparkle" style="top:5%;left:10%;animation-delay:0s;">✨</span>
          <span class="sparkle" style="top:8%;right:12%;animation-delay:.25s;">⭐</span>
          <span class="sparkle" style="bottom:8%;left:15%;animation-delay:.5s;">💫</span>
          <span class="sparkle" style="bottom:5%;right:10%;animation-delay:.75s;">✨</span>
          <span class="sparkle" style="top:42%;left:2%;animation-delay:.15s;">⭐</span>
          <span class="sparkle" style="top:42%;right:2%;animation-delay:.6s;">💫</span>

      <div id="countdown" style="font-size:4rem;font-weight:900;color:var(--accent);line-height:1;">3</div>

  <!-- ══════════════════════════════════════
       RESULT

  <div id="screen-result" class="screen">

      <div style="font-size:2.2rem;margin-bottom:.3rem;">🎉</div>
      <h2 class="grad-text" style="font-size:1.6rem;font-weight:900;margin-bottom:.3rem;">キャラ完成！</h2>
      <p style="color:var(--muted);font-size:.84rem;margin-bottom:.8rem;">あなたたちだけの世界に1つのキャラクター</p>
      <div style="display:flex;align-items:center;justify-content:center;gap:.5rem;margin-bottom:.8rem;">
        <span id="res-id-a" class="id-tag">@---</span>

      </div>
      <div class="style-row">
        <button class="sty-btn active" onclick="switchStyle('bottts',this)">🤖 ロボット</button>
        <button class="sty-btn" onclick="switchStyle('lorelei',this)">👤 キャラ</button>
        <button class="sty-btn" onclick="switchStyle('pixel-art',this)">👾 ピクセル</button>
        <button class="sty-btn" onclick="switchStyle('fun-emoji',this)">😎 絵文字</button>

  <!-- ══════════════════════════════════════
       ERROR
  ══════════════════════════════════════ -->
  <div id="screen-error" class="screen">
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;">
      <div style="font-size:3rem;margin-bottom:.8rem;">⚠️</div>
      <h2 style="font-size:1.2rem;font-weight:700;margin-bottom:.5rem;">エラーが発生しました</h2>
      <p id="err-detail" style="color:var(--muted);font-size:.84rem;margin-bottom:2rem;line-height:1.6;"></p>
      <button class="btn btn-p" onclick="goHome()">ホームに戻る</button>
    </div>
  </div>

</div><!-- /app -->

<!-- QRスキャン (jsQR) -->
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>

<script>
// ============================================================
// PWA マニフェスト
// ============================================================
(function(){
  const m = {name:'ガチャボット',short_name:'ガチャボット',description:'2人のInstagramIDでキャラクターを生成',
    start_url:'./',display:'standalone',background_color:'#0F0E17',theme_color:'#6C63FF',
    icons:[{src:"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>",sizes:'192x192',type:'image/svg+xml'}]};
  document.getElementById('pwa-manifest').href = URL.createObjectURL(new Blob([JSON.stringify(m)],{type:'application/json'}));
})();

// ============================================================
// STATE
// ============================================================
let id1        = null;   // 1人目のInstagram ID
let id2        = null;   // 2人目のInstagram ID
let currentSeed = null;
let curStyle    = 'bottts';
const activeScans = {};

// ============================================================
// SCREEN
// ============================================================
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
}
function resetSlots() {
  ['1','2'].forEach(n => {
    const slot = document.getElementById('slot' + n);
    slot.classList.remove('filled');
    slot.innerHTML = `<div class="slot-label">${n}つ目</div><div class="slot-icon">📷</div>`;
  });
  document.getElementById('btn-scan1').textContent = '📷 1つ目のQRを読む';
  document.getElementById('btn-scan2').disabled = true;
}
function updateSlot(num, igId) {
  const slot = document.getElementById('slot' + num);
  slot.classList.add('filled');
  const display = igId.length > 16 ? igId.slice(0, 14) + '…' : igId;
  slot.innerHTML = `
    <div class="slot-label">${num}つ目 ✅</div>
    <div class="slot-icon">🤖</div>
    <div class="slot-id">@${display}</div>
  `;
}
function goHome() {
  stopScanners();
  id1 = id2 = currentSeed = null;
  resetSlots();
  showScreen('welcome');
}
function showErr(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg; el.style.display = 'block';
}
function hideErr(id) {
  const el = document.getElementById(id);
  if (el) el.style.display = 'none';
}

// ============================================================
// QR SCANNING (jsQR + canvas)
// ============================================================
function stopScan(key) {
  const s = activeScans[key];
  if (!s) return;
  if (s.rafId) cancelAnimationFrame(s.rafId);
  if (s.stream) s.stream.getTracks().forEach(t => t.stop());
  const v = document.getElementById(s.videoId);
  if (v) v.srcObject = null;
  delete activeScans[key];
}
function stopScanners() {
  Object.keys(activeScans).forEach(key => stopScan(key));
}
function startScan(videoId, canvasId, key, onDetect, errId) {
  stopScan(key);
  const video  = document.getElementById(videoId);
  const canvas = document.getElementById(canvasId);
  const ctx    = canvas.getContext('2d');
  let lastDetect = 0;
  let lastWarn   = 0;

  navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: 'environment' } } })
    .then(stream => {
      activeScans[key] = { stream, rafId: null, videoId, canvasId };
      video.srcObject = stream;
      video.play();

      function tick() {
        if (!activeScans[key]) return;
        if (video.readyState === video.HAVE_ENOUGH_DATA) {
          canvas.width  = video.videoWidth;
          canvas.height = video.videoHeight;
          ctx.drawImage(video, 0, 0);
          const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const code    = jsQR(imgData.data, imgData.width, imgData.height, { inversionAttempts: 'dontInvert' });
          if (code) {
            const id  = extractIgId(code.data);
            const now = Date.now();
            if (id) {
              if (now - lastDetect > 2000) {
                lastDetect = now;
                onDetect(id);
              }
            } else if (now - lastWarn > 3000) {
              lastWarn = now;
              showErr(errId, 'インスタグラムのQRコードが読み取れませんでした。もう一度試してください。');
            }
          }
        }
        if (activeScans[key]) activeScans[key].rafId = requestAnimationFrame(tick);
      }
      activeScans[key].rafId = requestAnimationFrame(tick);
    })
    .catch(() => showErr(errId, 'カメラにアクセスできません。ブラウザのカメラ許可を確認してください。'));
}

// ============================================================
// INSTAGRAM ID EXTRACTION
// ============================================================
function extractIgId(text) {
  if (!text) return null;
  text = text.trim();
  const m1 = text.match(/(?:https?:\/\/)?(?:www\.)?instagram\.com\/([A-Za-z0-9._]{1,30})\/?(?:[?#].*)?$/);
  if (m1) return m1[1].toLowerCase();
  const m2 = text.match(/^@?([A-Za-z0-9._]{1,30})$/);
  if (m2) return m2[1].toLowerCase();
  return null;
}

// ============================================================
// SEED & DICEBEAR
// ============================================================
function makeSeed(a, b) { return [a, b].sort().join(''); }
function charUrl(seed, style) {
  return `https://api.dicebear.com/7.x/${style}/svg?seed=${encodeURIComponent(seed)}&backgroundColor=b6e3f4,c0aede,d1d4f9,ffd5dc,ffdfbf`;
}

// ============================================================
// APP FLOW
// ============================================================
function startApp1() {
  hideErr('scan1-err');
  showScreen('scan1');
  setTimeout(() => {
    startScan('scan-video1', 'scan-canvas1', 'scan1', (scannedId) => {
      stopScan('scan1');
      id1 = scannedId;
      updateSlot(1, id1);
      document.getElementById('btn-scan1').textContent = '✅ 1つ目 スキャン済み';
      document.getElementById('btn-scan2').disabled = false;
      showScreen('welcome');
    }, 'scan1-err');
  }, 350);
}

function startApp2() {
  if (!id1) return;
  hideErr('scan2-err');
  document.getElementById('scan1-name').textContent = '@' + id1;
  showScreen('scan2');
  setTimeout(() => {
    startScan('scan-video2', 'scan-canvas2', 'scan2', (scannedId) => {
      if (scannedId === id1) {
        showErr('scan2-err', '同じIDです。別の人のQRをスキャンしてください。');
        return;
      }
      stopScan('scan2');
      id2 = scannedId;
      updateSlot(2, id2);
      currentSeed = makeSeed(id1, id2);
      showScreen('welcome');
      setTimeout(() => startGenerating(), 400);
    }, 'scan2-err');
  }, 350);
}

// ============================================================
// GENERATING ANIMATION
// ============================================================
function startGenerating() {
  stopScanners();
  showScreen('generating');
  let n = 3;
  const cdEl = document.getElementById('countdown');
  cdEl.textContent = n;
  const t = setInterval(() => {
    n--;
    if (n > 0) { cdEl.textContent = n; }
    else { clearInterval(t); showResult(); }
  }, 1000);
}

// ============================================================
// RESULT
// ============================================================
function showResult() {
  const ids = [id1, id2].sort();
  document.getElementById('res-id-a').textContent = '@' + ids[0];
  document.getElementById('res-id-b').textContent = '@' + ids[1];
  curStyle = 'bottts';
  updateChar();
  document.querySelectorAll('.sty-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.sty-btn').classList.add('active');
  showScreen('result');
}

function updateChar() {
  const img = document.getElementById('result-img');
  img.src = charUrl(currentSeed, curStyle);
  img.style.animation = 'none';
  img.offsetHeight; // reflow
  img.style.animation = 'revealChar .6s cubic-bezier(.34,1.56,.64,1) forwards';
}

function switchStyle(style, btn) {
  curStyle = style;
  document.querySelectorAll('.sty-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  updateChar();
}

async function downloadCharacter() {
  const url = charUrl(currentSeed, curStyle);
  const fname = `machichara_${currentSeed}_${curStyle}.png`;
  try {
    const res = await fetch(url);
    const svgText = await res.text();
    const svgBlob = new Blob([svgText], {type:'image/svg+xml;charset=utf-8'});
    const svgUrl = URL.createObjectURL(svgBlob);
    const img = new Image();
    img.onload = () => {
      const c = document.createElement('canvas');
      c.width = 512; c.height = 512;
      const ctx = c.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, 512, 512);
      ctx.drawImage(img, 0, 0, 512, 512);
      c.toBlob(blob => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = fname; a.click();
        URL.revokeObjectURL(svgUrl);
      }, 'image/png');
    };
    img.onerror = () => {
      const a = document.createElement('a'); a.href = svgUrl;
      a.download = fname.replace('.png','.svg'); a.click();
    };
    img.src = svgUrl;
  } catch(e) {
    alert('ダウンロードに失敗しました。画像を長押しして保存してください。');
  }
}

// ============================================================
// INIT
// ============================================================
window.addEventListener('load', () => {
  showScreen('welcome');
});
</script>
